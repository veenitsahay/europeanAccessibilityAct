# --- Datasource (defaults match the bundled docker-compose: port 5433, db eaascan) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/eaascan}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:welcome}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Scanner process ---
# Command used to launch Node and the path to the scanner script.
app.scanner.command=${APP_SCANNER_COMMAND:node}
app.scanner.script=${APP_SCANNER_SCRIPT:../scanner/scan.js}
# Hard server-side cap regardless of what the request asks for.
app.scanner.max-pages-cap=50
# Kill a scan process after this many minutes.
app.scanner.timeout-minutes=15

server.port=${SERVER_PORT:8081}
